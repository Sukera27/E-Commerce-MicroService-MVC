version: "3.9"

services:
  db-inventory:
    container_name: db-inventory
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: sukera27
      POSTGRES_PASSWORD: Rafael123
      POSTGRES_DB: ms_inventory
    ports:
      - "5431:5432"

  db-orders:
    container_name: db-orders
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ms_orders
      POSTGRES_USER: sukera27
      POSTGRES_PASSWORD: Rafael123
    ports:
      - "5433:5432"

  db-products:
    container_name: db-products
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: sukera27
      POSTGRES_PASSWORD: Rafael123
      POSTGRES_DB: ms_products
    ports:
      - "5432:5432"
  db-keycloak:
    container_name: db-keycloak
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: sukera27
      POSTGRES_PASSWORD: Rafael123
      POSTGRES_DB: ms_keycloak
    ports:
      - "5434:5432"
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:latest
    command: ["start-dev"]
    restart: unless-stopped
    ports:
      - "8181:8181"
    expose:
      - "8181"
    depends_on:
      - db-keycloak
    environment:
      - db_vendor=postgres
      - db_addr=db-keycloak
      - db_port=5432
      - db_database=ms_keycloak
      - db_user=sukera27
      - db_password=Rafael123
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - kc_http_port=8181
  sonarqube:
    container_name: sonarqube
    image: sonarqube:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:latest
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 1000
    ports:
      - "2181:2181"

  kafka:
      container_name: kafka
      image: confluentinc/cp-kafka:7.4.0
      depends_on:
        - zookeeper
      ports:
        - "9092:9092"
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
  zipkin:
    container_name: zipkin
    image: openzipkin/zipkin:latest
    restart: unless-stopped
    ports:
      - "9411:9411"
  prometheus:
      container_name: prometheus
      image: prom/prometheus:v2.46.0
      ports:
        - "9090:9090"
      volumes:
        - ./files/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:10.0.3
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    links:
      - prometheus
    volumes:
      - ./files/grafana:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    depends_on:
      - prometheus