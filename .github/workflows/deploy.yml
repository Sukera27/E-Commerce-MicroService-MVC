name: Build and Push to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ACR_NAME: contenedoresjg987654
      ACR_LOGIN_SERVER: contenedoresjg987654.azurecr.io
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ---------------------------
      # Build & Push Microservices (Manual Step by Step)
      # ---------------------------
      
      # 1. API Gateway
      - name: Build & Push API Gateway
        run: |
          mvn clean package -DskipTests -f apigetway/pom.xml
          docker build -t $ACR_LOGIN_SERVER/api-gateway:${{ github.sha }} ./apigetway
          docker push $ACR_LOGIN_SERVER/api-gateway:${{ github.sha }}

      # 2. Inventory Service
      - name: Build & Push Inventory Service
        run: |
          mvn clean package -DskipTests -f inventory-service/pom.xml
          docker build -t $ACR_LOGIN_SERVER/inventory-service:${{ github.sha }} ./inventory-service
          docker push $ACR_LOGIN_SERVER/inventory-service:${{ github.sha }}

      # 3. Orders Service
      - name: Build & Push Orders Service
        run: |
          mvn clean package -DskipTests -f orders-service/pom.xml
          docker build -t $ACR_LOGIN_SERVER/orders-service:${{ github.sha }} ./orders-service
          docker push $ACR_LOGIN_SERVER/orders-service:${{ github.sha }}

      # 4. Products Service
      - name: Build & Push Products Service
        run: |
          mvn clean package -DskipTests -f products-service/pom.xml
          docker build -t $ACR_LOGIN_SERVER/products-service:${{ github.sha }} ./products-service
          docker push $ACR_LOGIN_SERVER/products-service:${{ github.sha }}

      # ---------------------------
      # Update Kustomize Image Tags
      # ---------------------------
      - name: Update Kustomize
        run: |
          cd manifests
          kustomize edit set image contenedoresjg987654.azurecr.io/api-gateway=contenedoresjg987654.azurecr.io/api-gateway:${{ github.sha }}
          kustomize edit set image contenedoresjg987654.azurecr.io/inventory-service=contenedoresjg987654.azurecr.io/inventory-service:${{ github.sha }}
          kustomize edit set image contenedoresjg987654.azurecr.io/orders-service=contenedoresjg987654.azurecr.io/orders-service:${{ github.sha }}
          kustomize edit set image contenedoresjg987654.azurecr.io/products-service=contenedoresjg987654.azurecr.io/products-service:${{ github.sha }}

      - name: Commit & Push changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git commit -am "chore(deploy): update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push

      # ---------------------------
      # Pull official images, tag and push
      # ---------------------------
      - name: Push prebuilt images (Keycloak, Zipkin, Kafka, Zookeeper)
        run: |
          for IMAGE in \
            "quay.io/keycloak/keycloak:latest keycloak" \
            "openzipkin/zipkin:latest zipkin" \
            "confluentinc/cp-zookeeper:latest zookeeper" \
            "confluentinc/cp-kafka:7.4.0 kafka"; do
            ORIGINAL=$(echo $IMAGE | cut -d' ' -f1)
            TAG=$(echo $IMAGE | cut -d' ' -f2)
            docker pull $ORIGINAL
            docker tag $ORIGINAL $ACR_LOGIN_SERVER/$TAG:latest
            docker push $ACR_LOGIN_SERVER/$TAG:latest
          done

      # ---------------------------
      # Build and push Prometheus
      # ---------------------------
      - name: Build & Push Prometheus
        run: |
          docker build -t $ACR_LOGIN_SERVER/prometheus:latest -f files/Dockerfile .
          docker push $ACR_LOGIN_SERVER/prometheus:latest

      # ---------------------------
      # Build and push Grafana
      # ---------------------------
      - name: Build & Push Grafana
        run: |
          docker build -t $ACR_LOGIN_SERVER/grafana:latest -f files/grafana/Dockerfile .
          docker push $ACR_LOGIN_SERVER/grafana:latest